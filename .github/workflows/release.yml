name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  LIBPLCTAG_VERSION: "2.6.15"

jobs:
  compile:
    strategy:
      matrix:
        include:
          - platform: linux-amd64
            runs-on: ubuntu-latest
            goos: linux
            goarch: amd64
          - platform: linux-arm64
            runs-on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build libplctag from source
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential
          git clone --depth 1 --branch v${{ env.LIBPLCTAG_VERSION }} \
            https://github.com/libplctag/libplctag.git /tmp/libplctag
          cmake -S /tmp/libplctag -B /tmp/libplctag/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/libplctag/build --parallel
          sudo cmake --install /tmp/libplctag/build
          sudo ldconfig

      - name: Compile for ${{ matrix.platform }}
        run: |
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" \
            -o dist/tentacle-ethernetip-go-${{ matrix.platform }} .

      - uses: actions/upload-artifact@v4
        with:
          name: tentacle-ethernetip-go-${{ matrix.platform }}
          path: dist/tentacle-ethernetip-go-*

  release:
    needs: compile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
