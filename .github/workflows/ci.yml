name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  LIBPLCTAG_VERSION: "2.6.15"

jobs:
  test:
    strategy:
      matrix:
        include:
          - platform: linux-amd64
            runs-on: ubuntu-latest
          - platform: linux-arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build libplctag from source
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential
          git clone --depth 1 --branch v${{ env.LIBPLCTAG_VERSION }} \
            https://github.com/libplctag/libplctag.git /tmp/libplctag
          cmake -S /tmp/libplctag -B /tmp/libplctag/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/libplctag/build --parallel
          sudo cmake --install /tmp/libplctag/build
          sudo ldconfig

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -count=1 -race ./...

      - name: Build
        run: |
          CGO_ENABLED=1 go build -ldflags="-s -w" -o /dev/null .
